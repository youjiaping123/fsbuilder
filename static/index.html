<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fs-builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    .input-base {
      background: #1f2937; border: 1px solid #374151; border-radius: 0.5rem;
      padding: 0.375rem 0.625rem; font-size: 0.875rem; color: #f3f4f6;
      width: 100%; outline: none; transition: border-color 0.15s;
    }
    .input-base:focus { border-color: #3b82f6; }
    .input-base::placeholder { color: #6b7280; }
    #codeOutput { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    #analyzeStream { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
    .env-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 0.65rem; color: #34d399; background: #064e3b;
      border: 1px solid #065f46; border-radius: 9999px;
      padding: 1px 6px; white-space: nowrap;
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col select-none">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-5 py-3 flex items-center gap-3 shrink-0">
    <svg class="w-5 h-5 text-blue-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
    </svg>
    <span class="font-bold text-white text-base">fs-builder</span>
    <span class="text-gray-500 text-sm hidden sm:inline">Natural Language → Onshape FeatureScript</span>
  </header>

  <!-- Main layout -->
  <div class="flex-1 flex overflow-hidden">

    <!-- Left sidebar -->
    <div class="w-72 shrink-0 border-r border-gray-800 flex flex-col overflow-y-auto bg-gray-900/50">

      <!-- Config section -->
      <div class="p-4 border-b border-gray-800">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-3">Configuration</p>
        <div class="space-y-2.5">
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="text-xs text-gray-500">API Key</label>
              <span id="apiKeyBadge" class="env-badge hidden">✓ from .env</span>
            </div>
            <input type="password" id="apiKey" class="input-base" placeholder="sk-… (or set OPENAI_API_KEY)" autocomplete="off">
          </div>
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="text-xs text-gray-500">Base URL</label>
              <span id="baseUrlBadge" class="env-badge hidden">✓ from .env</span>
            </div>
            <input type="text" id="baseUrl" class="input-base" value="https://api.openai.com/v1">
          </div>
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="text-xs text-gray-500">Analyze Model</label>
              <span id="analyzeModelBadge" class="env-badge hidden">✓ from .env</span>
            </div>
            <input type="text" id="analyzeModel" class="input-base" value="gpt-4o">
          </div>
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="text-xs text-gray-500">Generate Model</label>
              <span id="generateModelBadge" class="env-badge hidden">✓ from .env</span>
            </div>
            <input type="text" id="generateModel" class="input-base" value="gpt-4o-mini">
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Concurrency</label>
            <input type="number" id="concurrency" class="input-base" value="4" min="1" max="16" style="width:5rem">
          </div>
        </div>
      </div>

      <!-- Requirement section -->
      <div class="flex-1 flex flex-col p-4">
        <div class="flex items-center justify-between mb-2">
          <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Requirement</p>
          <button onclick="loadExample()" class="text-xs text-blue-400 hover:text-blue-300 transition-colors">Load example</button>
        </div>
        <textarea
          id="requirement"
          class="input-base flex-1 resize-none text-xs leading-relaxed select-text"
          style="min-height: 220px; font-family: inherit;"
          placeholder="用中文或英文描述你的机械装配体需求…&#10;&#10;例：设计一套冷拔模具，外径50mm，壁厚5mm，材料硬质合金，包含凸模、凹模和压边圈。"
        ></textarea>
        <button
          id="generateBtn"
          onclick="startGenerate()"
          class="mt-3 w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-semibold py-2 px-4 rounded-lg transition-all text-sm flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100"
        >
          <svg id="btnIcon" class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          <span id="btnText">Generate FeatureScript</span>
        </button>
      </div>
    </div>

    <!-- Right content area -->
    <div class="flex-1 flex flex-col overflow-hidden">

      <!-- Progress panel -->
      <div class="border-b border-gray-800 p-4 shrink-0">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-3">Progress</p>
        <div id="progressSteps" class="space-y-1.5">
          <p class="text-sm text-gray-600 italic">Click "Generate FeatureScript" to begin.</p>
        </div>
      </div>

      <!-- Streaming analyze output (Step 1) -->
      <div id="analyzePanel" class="border-b border-gray-800 shrink-0" style="display:none">
        <div class="flex items-center justify-between px-4 py-2 shrink-0">
          <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Analyzing…</p>
          <span id="analyzeChars" class="text-xs text-gray-600"></span>
        </div>
        <pre id="analyzeStream" class="overflow-auto text-xs text-yellow-200/80 bg-gray-950/60 px-4 pb-3 m-0 select-text" style="max-height:200px;white-space:pre-wrap;word-break:break-all"></pre>
      </div>

      <!-- Output panel -->
      <div id="outputPanel" class="flex-1 flex flex-col overflow-hidden" style="display:none!important">
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-800 shrink-0">
          <div class="flex items-center gap-2">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Output</p>
            <span id="outputMeta" class="text-xs text-gray-600"></span>
          </div>
          <div class="flex gap-2">
            <button onclick="copyCode()" id="copyBtn"
              class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
              </svg>
              Copy
            </button>
            <button onclick="downloadCode()"
              class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
              </svg>
              Download .fs
            </button>
          </div>
        </div>
        <pre id="codeOutput" class="flex-1 overflow-auto text-xs text-emerald-300 bg-gray-950 p-4 m-0 select-text"></pre>
      </div>
    </div>
  </div>

<script>
  let currentCode = '';
  let currentFilename = 'output.fs';
  let isGenerating = false;

  const EXAMPLE = `设计一个冷拉延模具（Cold Drawing Die），用于将金属板材拉深成圆筒形工件。

工件参数：
- 内径：60 mm，壁厚：2 mm（外径 64 mm），筒深：50 mm

模具零件：
- 凸模（Punch）：实心圆柱，直径 60 mm，高度 80 mm
- 凹模（Die Body）：空心圆柱，外径 160 mm，内径 64 mm，高度 60 mm
- 压边圈（Blank Holder）：空心圆柱，外径 160 mm，内径 80 mm，厚度 20 mm
- 上模座（Upper Die Seat）：方块，200×200×40 mm
- 下模座（Lower Die Seat）：方块，200×200×40 mm

装配关系：凸模压配入凹模，压边圈由上模座导向，上下模座螺栓固定。`;

  // ── Load env-var defaults on page load ──────────────────────────────────
  (async function loadConfig() {
    try {
      const cfg = await fetch('/api/config').then(r => r.json());
      if (cfg.has_api_key) {
        document.getElementById('apiKey').placeholder = '● ● ● ● (set via OPENAI_API_KEY)';
        document.getElementById('apiKeyBadge').classList.remove('hidden');
      }
      if (cfg.base_url) {
        document.getElementById('baseUrl').value = cfg.base_url;
        if (cfg.base_url !== 'https://api.openai.com/v1') {
          document.getElementById('baseUrlBadge').classList.remove('hidden');
        }
      }
      if (cfg.analyze_model) {
        document.getElementById('analyzeModel').value = cfg.analyze_model;
        if (cfg.analyze_model !== 'gpt-4o') {
          document.getElementById('analyzeModelBadge').classList.remove('hidden');
        }
      }
      if (cfg.generate_model) {
        document.getElementById('generateModel').value = cfg.generate_model;
        if (cfg.generate_model !== 'gpt-4o-mini') {
          document.getElementById('generateModelBadge').classList.remove('hidden');
        }
      }
    } catch (_) {}
  })();

  function loadExample() {
    document.getElementById('requirement').value = EXAMPLE;
  }

  function setGenerating(val) {
    isGenerating = val;
    const btn = document.getElementById('generateBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    btn.disabled = val;
    if (val) {
      btnText.textContent = 'Generating…';
      btnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>';
      btnIcon.classList.add('spin');
    } else {
      btnText.textContent = 'Generate FeatureScript';
      btnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>';
      btnIcon.classList.remove('spin');
    }
  }

  // Step state: {status: 'pending'|'running'|'done'|'error', title, detail, progress}
  function renderSteps(steps) {
    const el = document.getElementById('progressSteps');
    el.innerHTML = steps.map(s => {
      const icons = {
        pending: `<svg class="w-4 h-4 text-gray-700 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/></svg>`,
        running: `<svg class="w-4 h-4 text-blue-400 shrink-0 spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/><path fill="currentColor" opacity="0.75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>`,
        done:    `<svg class="w-4 h-4 text-green-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
        error:   `<svg class="w-4 h-4 text-red-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
      };
      const titleColors  = { pending:'text-gray-600', running:'text-blue-200', done:'text-gray-200', error:'text-red-300' };
      const detailColors = { pending:'text-gray-600', running:'text-gray-400', done:'text-gray-500',  error:'text-red-400' };
      const prog = s.progress;
      return `
        <div class="flex items-start gap-2.5 px-2 py-1.5 rounded-lg ${s.status==='running'?'bg-gray-800/60':s.status==='error'?'bg-red-950/30':''}">
          <div class="mt-0.5">${icons[s.status]}</div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium ${titleColors[s.status]}">${s.title}</div>
            ${s.detail ? `<div class="text-xs ${detailColors[s.status]} mt-0.5 break-all line-clamp-3 leading-relaxed">${s.detail}</div>` : ''}
            ${prog ? `
              <div class="mt-1.5">
                <div class="flex justify-between text-xs text-gray-600 mb-1">
                  <span>${prog.done} / ${prog.total} parts</span>
                  <span>${Math.round(prog.done/prog.total*100)}%</span>
                </div>
                <div class="h-1 bg-gray-700 rounded-full overflow-hidden">
                  <div class="h-full bg-blue-500 rounded-full transition-all duration-300" style="width:${prog.done/prog.total*100}%"></div>
                </div>
                ${prog.lastPart ? `<div class="text-xs text-gray-600 mt-1 truncate">✓ ${prog.lastPart}</div>` : ''}
              </div>
            ` : ''}
          </div>
        </div>`;
    }).join('');
  }

  async function startGenerate() {
    if (isGenerating) return;

    const requirement = document.getElementById('requirement').value.trim();
    if (!requirement) { alert('请输入需求描述。'); return; }

    const apiKey = document.getElementById('apiKey').value.trim();
    // apiKey may be empty if OPENAI_API_KEY env var is set — backend will use it

    const payload = {
      requirement,
      api_key: apiKey,
      base_url: document.getElementById('baseUrl').value.trim() || '',
      analyze_model: document.getElementById('analyzeModel').value.trim() || '',
      generate_model: document.getElementById('generateModel').value.trim() || '',
      concurrency: parseInt(document.getElementById('concurrency').value) || 4,
    };

    setGenerating(true);
    document.getElementById('outputPanel').style.display = 'none';
    // Reset analyze stream panel
    document.getElementById('analyzePanel').style.display = 'none';
    document.getElementById('analyzeStream').textContent = '';
    document.getElementById('analyzeChars').textContent = '';
    currentCode = '';

    const steps = [
      { status: 'pending', title: 'Step 1 — Analyze Requirement',     detail: '', progress: null },
      { status: 'pending', title: 'Step 2 — Generate FeatureScript',  detail: '', progress: null },
      { status: 'pending', title: 'Step 3 — Merge Output File',       detail: '', progress: null },
    ];
    renderSteps(steps);

    try {
      const resp = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!resp.ok) {
        throw new Error(await resp.text());
      }

      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            handleEvent(JSON.parse(line.slice(6)), steps);
          } catch (_) {}
        }
      }
    } catch (e) {
      const running = steps.findIndex(s => s.status === 'running');
      const target = running >= 0 ? running : 0;
      steps[target].status = 'error';
      steps[target].detail = e.message;
      renderSteps(steps);
    } finally {
      setGenerating(false);
    }
  }

  let analyzeCharCount = 0;

  function handleEvent(data, steps) {
    const idx = data.n - 1;

    if (data.type === 'step') {
      if (data.status === 'start') {
        steps[idx].status = 'running';
        steps[idx].detail = data.message || '';
        if (data.n === 1) {
          // Show the streaming panel for Step 1
          analyzeCharCount = 0;
          document.getElementById('analyzePanel').style.display = '';
          document.getElementById('analyzeStream').textContent = '';
        }
        if (data.n === 2 && data.total) {
          steps[idx].progress = { done: 0, total: data.total, lastPart: null };
          // Hide analyze panel now that Step 1 is done
          document.getElementById('analyzePanel').style.display = 'none';
        }
      } else if (data.status === 'done') {
        steps[idx].status = 'done';
        if (data.summary) {
          steps[idx].detail = `${data.summary.assembly_name} · ${data.summary.parts_count} parts`;
        }
        if (data.n === 1) {
          document.getElementById('analyzePanel').style.display = 'none';
        }
        if (data.n === 2) {
          steps[idx].detail = `${data.success} succeeded${data.failed ? `, ${data.failed} failed` : ''}`;
          if (steps[idx].progress) steps[idx].progress.done = steps[idx].progress.total;
        }
      }
      renderSteps(steps);

    } else if (data.type === 'analyze_token') {
      // Append streaming token to the analyze panel
      const el = document.getElementById('analyzeStream');
      el.textContent += data.text;
      analyzeCharCount += data.text.length;
      document.getElementById('analyzeChars').textContent = `${analyzeCharCount} chars`;
      // Auto-scroll to bottom
      el.scrollTop = el.scrollHeight;

    } else if (data.type === 'part_progress') {
      if (steps[1].progress) {
        steps[1].progress.done = data.done;
        steps[1].progress.lastPart = data.part_name;
      }
      renderSteps(steps);

    } else if (data.type === 'done') {
      currentCode = data.code;
      currentFilename = data.filename;
      document.getElementById('outputMeta').textContent =
        `${data.filename}  ·  ${(data.size / 1024).toFixed(1)} KB`;
      document.getElementById('codeOutput').textContent = data.code;
      document.getElementById('outputPanel').style.removeProperty('display');

    } else if (data.type === 'error') {
      const running = steps.findIndex(s => s.status === 'running');
      const target = running >= 0 ? running : 0;
      steps[target].status = 'error';
      steps[target].detail = data.message;
      renderSteps(steps);
      document.getElementById('analyzePanel').style.display = 'none';
    }
  }

  async function copyCode() {
    if (!currentCode) return;
    await navigator.clipboard.writeText(currentCode);
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => {
      btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>Copy`;
    }, 2000);
  }

  function downloadCode() {
    if (!currentCode) return;
    const blob = new Blob([currentCode], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = currentFilename;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
