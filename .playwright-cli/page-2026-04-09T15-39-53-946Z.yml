on\": \"Top support plate for the upper die assembly.\" } ], \"assembly_relations\": [ { \"child_id\": \"die_ring\", \"parent_id\": \"lower_die_shoe\", \"relation\": \"stacked_on\" }, { \"child_id\": \"punch\", \"parent_id\": \"lower_die_shoe\", \"relation\": \"stacked_on\" }, { \"child_id\": \"blank_holder_ring\", \"parent_id\": \"upper_die_shoe\", \"relation\": \"stacked_on\" }, { \"child_id\": \"upper_die_shoe\", \"parent_id\": \"blank_holder_ring\", \"relation\": \"bolted_to\" } ] }"
