limeter, \"radius\" : radius }); setProperty(context, { \"entities\" : qCreatedBy(id + \"punch_cylinder\", EntityType.BODY), \"propertyType\" : PropertyType.NAME, \"value\" : \"Punch\" }); } // ── Blank Holder Ring (blank_holder_ring) ────────────────── { var outerRadius = 80 * millimeter; var innerRadius = 31 * millimeter; fCylinder(context, id + \"blank_holder_ring_outer\", { \"bottomCenter\" : vector(0, 0, 120) * millimeter, \"topCenter\" : vector(0, 0, 140) * millimeter, \"radius\" : outerRadius }); fCylinder(context, id + \"blank_holder_ring_inner\", { \"bottomCenter\" : vector(0, 0, 120) * millimeter, \"topCenter\" : vector(0, 0, 140) * millimeter, \"radius\" : innerRadius }); opBoolean(context, id + \"blank_holder_ring_subtract\", { \"tools\" : qCreatedBy(id + \"blank_holder_ring_inner\", EntityType.BODY), \"targets\" : qCreatedBy(id + \"blank_holder_ring_outer\", EntityType.BODY), \"operationType\" : BooleanOperationType.SUBTRACTION }); setProperty(context, { \"entities\" : qCreatedBy(id + \"blank_holder_ring_outer\", EntityType.BODY), \"propertyType\" : PropertyType.NAME, \"value\" : \"Blank Holder Ring\" }); } // ── Upper Die Shoe (upper_die_shoe) ────────────────── { fCuboid(context, id + \"upper_die_shoe_cuboid\", { \"corner1\" : vector(-100, -100, 120) * millimeter, \"corner2\" : vector(100, 100, 160) * millimeter }); setProperty(context, { \"entities\" : qCreatedBy(id + \"upper_die_shoe_cuboid\", EntityType.BODY), \"propertyType\" : PropertyType.NAME, \"value\" : \"Upper Die Shoe\" }); } });"